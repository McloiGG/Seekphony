name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - "codex/**"

permissions:
  contents: read

jobs:
  repository:
    name: Repository policy checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install uv
        run: python -m pip install uv==0.8.22

      - name: Check tool versions
        run: python scripts/check_tool_versions.py

      - name: Check Python dependency policy
        run: python scripts/check_pyproject_dependencies.py

      - name: Check committed secrets
        run: python scripts/check_no_secrets.py

      - name: Check Conventional Commits
        run: python scripts/check_conventional_commits.py

  backend:
    name: Backend checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install uv
        run: python -m pip install uv==0.8.22

      - name: Install backend
        working-directory: backend
        run: uv sync --frozen

      - name: Ruff format
        working-directory: backend
        run: uv run ruff format --check . ../scripts

      - name: Ruff lint
        working-directory: backend
        run: uv run ruff check . ../scripts

      - name: Pytest
        working-directory: backend
        run: uv run pytest

  frontend:
    name: Frontend checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22.18.0"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend
        working-directory: frontend
        run: npm ci

      - name: Lint frontend
        working-directory: frontend
        run: npm run lint

      - name: Typecheck frontend
        working-directory: frontend
        run: npm run typecheck

      - name: Test frontend
        working-directory: frontend
        run: npm test -- --run

      - name: Build frontend
        working-directory: frontend
        run: npm run build
