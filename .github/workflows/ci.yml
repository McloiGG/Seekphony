name: CI

on:
  pull_request:
  push:
    branches:
      - "**"
  workflow_dispatch:

permissions:
  contents: read

env:
  PYTHON_VERSION: "3.14"
  UV_VERSION: "0.8.22"
  RUFF_VERSION: "0.15.20"

jobs:
  quality-gate:
    name: Quality Gate
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install pinned uv
        run: python -m pip install --disable-pip-version-check "uv==$UV_VERSION"

      - name: Install pinned Python tools
        run: uv pip install --system "ruff==$RUFF_VERSION"

      - name: Run all checks
        run: python scripts/check_all.py
