services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file:
      - path: .env
        required: false
    environment:
      SEEKPHONY_APP_NAME: "${SEEKPHONY_APP_NAME:-Seekphony Backend}"
      SEEKPHONY_API_PREFIX: "${SEEKPHONY_API_PREFIX:-/api/v1}"
      SEEKPHONY_DATA_DIR: "${SEEKPHONY_DATA_DIR:-/app/var}"
      SEEKPHONY_DATABASE_PATH: "${SEEKPHONY_DATABASE_PATH:-/app/var/seekphony.sqlite3}"
      SEEKPHONY_MAX_UPLOAD_BYTES: "${SEEKPHONY_MAX_UPLOAD_BYTES:-31457280}"
      SEEKPHONY_MIN_CLIP_SECONDS: "${SEEKPHONY_MIN_CLIP_SECONDS:-5}"
      SEEKPHONY_MAX_CLIP_SECONDS: "${SEEKPHONY_MAX_CLIP_SECONDS:-60}"
      SEEKPHONY_DECODE_TIMEOUT_SECONDS: "${SEEKPHONY_DECODE_TIMEOUT_SECONDS:-15}"
      SEEKPHONY_PROVIDER_TIMEOUT_SECONDS: "${SEEKPHONY_PROVIDER_TIMEOUT_SECONDS:-8}"
      SEEKPHONY_CORS_ORIGINS: "${SEEKPHONY_CORS_ORIGINS:-*}"
      DATABASE_URL: "${DATABASE_URL:-}"
      GEMINI_API_KEY: "${GEMINI_API_KEY:-}"
      GOOGLE_API_KEY: "${GOOGLE_API_KEY:-}"
      SEEKPHONY_GEMINI_MODEL: "${SEEKPHONY_GEMINI_MODEL:-gemini-3.1-flash-lite}"
    ports:
      - "8000:8000"
    volumes:
      - seekphony-backend-data:/app/var

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    env_file:
      - path: .env
        required: false
    environment:
      SEEKPHONY_PUBLIC_API_BASE_URL: "${SEEKPHONY_PUBLIC_API_BASE_URL:-http://localhost:8000}"
    ports:
      - "${SEEKPHONY_FRONTEND_PORT:-5173}:80"

volumes:
  seekphony-backend-data:
