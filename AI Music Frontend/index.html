<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seekphoney - Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body class="bg-light">

    <nav class="navbar navbar-dark bg-dark shadow-sm">
        <div class="container-fluid px-4">
            <span class="navbar-brand mb-0 h1"><i class="bi bi-music-note-beamed me-2"></i>Seekphoney</span>
            <span class="text-secondary small">Trust & Safety Integration</span>
        </div>
    </nav>

    <div class="container-fluid p-4">
        <div class="row g-4">
            
            <div class="col-lg-8">
                
                <div class="card shadow-sm mb-4">
                    <div class="card-body p-4">
                        <h5 class="card-title mb-3">Discover Tracks</h5>
                        <div class="input-group input-group-lg">
                            <input type="text" id="searchInput" class="form-control" placeholder="Search by song name, artist, or lyrics...">
                            <button class="btn btn-outline-secondary" type="button" id="micBtn" title="Tap to Hum/Sing">
                                <i class="bi bi-mic-fill text-danger"></i>
                            </button>
                            <button class="btn btn-primary" type="button" id="searchBtn">Search</button>
                        </div>
                        <div id="recordingStatus" class="form-text text-danger mt-2 d-none">
                            <span class="spinner-grow spinner-grow-sm me-1" role="status"></span> Listening... Hum your melody now (5s)
                        </div>
                    </div>
                </div>

                <div id="alertContainer"></div>

                <h5 class="mb-3">Available Catalog</h5>
                <div class="row row-cols-1 row-cols-md-2 g-3" id="catalogGrid">
                    <div class="col">
                        <div class="card h-100 shadow-sm">
                            <div class="card-body d-flex justify-content-between align-items-center">
                                <div>
                                    <h6 class="card-title mb-1">Example Track Title</h6>
                                    <p class="text-muted small mb-0">Artist Name • Genre</p>
                                </div>
                                <button class="btn btn-success btn-sm rounded-circle"><i class="bi bi-play-fill"></i></button>
                            </div>
                        </div>
                    </div>
                </div>

            </div>

            <div class="col-lg-4">
                <div class="card shadow-sm mb-4">
                    <div class="card-body">
                        <h5 class="card-title mb-3">Listening Insights</h5>
                        <div class="mb-4">
                            <small class="text-muted d-block">Total Playtime Consumed</small>
                            <h3 class="fw-bold" id="totalPlaytime">0 mins</h3>
                        </div>
                        <hr>
                        <h6 class="text-muted mb-3">Top Tracks Frequency</h6>
                        <canvas id="analyticsChart" width="100" height="100"></canvas>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <div class="modal fade" id="addSongModal" data-bs-backdrop="static" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content shadow-lg border-0">
                <div class="modal-header bg-dark text-white">
                    <h5 class="modal-title"><i class="bi bi-plus-circle-fill text-primary me-2"></i>Contribute to Seekphoney</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body p-4">
                    <div id="modalAlertContainer"></div>
                    
                    <div class="mb-4 text-center">
                        <label class="form-label d-block fw-bold text-secondary mb-2">Select Import Method</label>
                        <div class="btn-group w-100" role="group">
                            <input type="radio" class="btn-check" name="intakeMethod" id="methodUrl" checked>
                            <label class="btn btn-outline-primary" for="methodUrl"><i class="bi bi-link-45deg me-1"></i> Paste Stream Link</label>

                            <input type="radio" class="btn-check" name="intakeMethod" id="methodFile">
                            <label class="btn btn-outline-primary" for="methodFile"><i class="bi bi-upload me-1"></i> Upload MP3/File</label>
                        </div>
                    </div>

                    <div id="urlInputContainer" class="mb-4">
                        <label class="form-label fw-semibold">Song URL (YouTube, SoundCloud, MP3 link)</label>
                        <div class="input-group">
                            <input type="url" class="form-control" id="songUrl" placeholder="https://www.youtube.com/watch?v=...">
                            <button class="btn btn-primary" type="button" id="analyzeUrlBtn">Analyze Link</button>
                        </div>
                    </div>

                    <div id="fileInputContainer" class="mb-4 d-none">
                        <label class="form-label fw-semibold">Upload Local Track</label>
                        <input type="file" class="form-control" id="songFile" accept="audio/*">
                    </div>

                    <div id="extractionSpinner" class="text-center text-primary my-3 d-none">
                        <span class="spinner-border spinner-border-sm me-2" role="status"></span>
                        <span class="small fw-semibold">Seekphoney AI parsing track metadata...</span>
                    </div>

                    <hr class="text-muted opacity-25">

                    <form id="addSongForm">
                        <div class="mb-3">
                            <label class="form-label text-muted small">Verified Song Title</label>
                            <input type="text" class="form-control fw-bold" id="modalTitle" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label text-muted small">Verified Artist Name</label>
                            <input type="text" class="form-control fw-bold" id="modalArtist" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label text-muted small">Genre Category</label>
                            <input type="text" class="form-control" id="modalGenre" placeholder="e.g., Synth-Pop, Rock, Lo-Fi" required>
                        </div>
                        <button type="submit" class="btn btn-success w-100 shadow-sm fw-semibold mt-2">Confirm & Save to Catalog</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
